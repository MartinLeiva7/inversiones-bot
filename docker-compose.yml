services:
  bot-trading:
    build: .
    container_name: bot_trading_prod
    restart: always
    environment:
      - DB_HOST=postgres_prod
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    networks:
      - telegram-bot_default # La red que ya usas para tus otros bots
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  telegram-bot_default:
    external: true
