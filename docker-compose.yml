services:
  bot-trading:
    build: .
    container_name: bot_trading_prod
    restart: always
    # ESTA ES LA CLAVE: Se pega al contenedor de la DB como si fuera uno solo
    network_mode: 'container:postgres_prod'
    environment:
      - DB_HOST=localhost # Al estar pegado al contenedor, la DB es localhost
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
