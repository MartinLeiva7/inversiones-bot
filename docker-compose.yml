services:
  # Agregamos la DB aquí para que sea el motor central
  db:
    image: postgres:15
    container_name: postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data # <--- ESTO PROTEGE TUS DATOS
    ports:
      - '5432:5432'

  bot-trading:
    build: .
    container_name: bot_trading_prod
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db # Ahora usamos el nombre del servicio
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
