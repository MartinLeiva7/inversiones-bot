services:
  bot-trading:
    build: .
    container_name: bot_trading_prod
    restart: always
    environment:
      - DB_HOST=postgres_prod # IMPORTANTE: El nombre de tu contenedor DB
      - DB_USER=user_admin
      - DB_PASSWORD=tu_password_real
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    networks:
      - mi_red_actual # La red que ya usas para tus otros bots
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  mi_red_actual:
    external: true
