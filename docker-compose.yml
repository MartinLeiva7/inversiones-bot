services:
  bot-trading:
    build: .
    container_name: bot_trading_prod
    restart: always
    environment:
      - DB_HOST=postgres_prod # Usamos el nombre del contenedor de la DB
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    networks:
      - mi_red_compartida
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  mi_red_compartida:
    external: true
    name: telegram-bot_default
